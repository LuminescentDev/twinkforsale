services:
  frontend:
    image: twinkforsale-frontend:local
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://backend:8080}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  backend:
    image: twinkforsale-backend:local
    build:
      context: backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__Default: ${CONNECTION_STRING:-Host=postgres;Port=5432;Database=twinkforsale;Username=postgres;Password=postgres}
      App__BaseUrl: ${API_BASE_URL:-http://localhost:5000}
      App__FrontendUrl: ${FRONTEND_URL:-http://localhost:3000}
      App__CookieDomain: ${COOKIE_DOMAIN:-.twink.forsale}
      Auth__JwtSecret: ${AUTH_JWT_SECRET:-dev-change-me}
      Discord__ClientId: ${DISCORD_CLIENT_ID:-}
      Discord__ClientSecret: ${DISCORD_CLIENT_SECRET:-}
      Storage__Provider: ${STORAGE_PROVIDER:-Local}
      Storage__LocalPath: /app/uploads
    ports:
      - "${BACKEND_PORT:-5000}:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-twinkforsale}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
