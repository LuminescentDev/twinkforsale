services:
  twink-frontend:
    image: twinkforsale-frontend:local
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://twink-api:8080}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
